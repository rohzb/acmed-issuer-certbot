name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  actions: read
  checks: read
  contents: write
  packages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

jobs:
  verify_ci:
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI workflow succeeded on tagged commit
        uses: rohzb/ci-actions/wait-for-workflows@fa15ae6132d071b36c875d64979fa70019b0e49f
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          workflows: '["CI"]'
          ref: ${{ github.sha }}
          mode: all_success
          timeout-seconds: "1200"
          poll-interval-seconds: "15"
          require-found: "true"
          fail-fast: "false"

  build-python:
    runs-on: ubuntu-latest
    needs: [verify_ci]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Validate tag and project version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y.Z, got: ${TAG}" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          PROJECT_VERSION="$(python - <<'PY'
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          print(data["project"]["version"])
          PY
          )"
          if [[ "${PROJECT_VERSION}" != "${VERSION}" ]]; then
            echo "Tag version (${VERSION}) does not match pyproject.toml (${PROJECT_VERSION})." >&2
            exit 1
          fi
          if ! grep -qE "^## \\[${VERSION}\\] " CHANGELOG.md; then
            echo "CHANGELOG.md is missing a section for [${VERSION}]." >&2
            exit 1
          fi

      - name: Run tests
        run: |
          python -m pip install --upgrade pip
          pip install .[dev]
          pytest

      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: python-dist
          path: dist/*

  publish-ghcr:
    runs-on: ubuntu-latest
    needs: [build-python]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Resolve plugin base image tag from SDK dependency
        id: sdk_base
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          import tomllib

          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)

          deps = data.get("project", {}).get("dependencies", [])
          dep = next((d for d in deps if d.startswith("acmed-plugin-sdk")), None)
          if dep is None:
              raise SystemExit("acmed-plugin-sdk dependency not found in pyproject.toml")

          match = re.search(r"/refs/tags/(v[0-9]+\.[0-9]+\.[0-9]+)\.tar\.gz", dep)
          if match:
              base_tag = match.group(1)
          else:
              match = re.search(r"==([0-9]+\.[0-9]+\.[0-9]+)", dep)
              if not match:
                  raise SystemExit(
                      f"Unable to derive base image tag from acmed-plugin-sdk dependency: {dep}"
                  )
              base_tag = f"v{match.group(1)}"

          import os

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"base_tag={base_tag}\n")
          PY

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ACMED_PLUGIN_BASE_IMAGE=ghcr.io/rohzb/acmed-plugin-base-image:${{ steps.sdk_base.outputs.base_tag }}

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [build-python]
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: python-dist
          path: dist

      - name: Publish to PyPI
        if: ${{ env.PYPI_API_TOKEN != '' }}
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          password: ${{ env.PYPI_API_TOKEN }}

  github-release:
    runs-on: ubuntu-latest
    needs: [build-python, publish-ghcr]
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: python-dist
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: |
            dist/*
